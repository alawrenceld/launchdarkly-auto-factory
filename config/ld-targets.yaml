# LaunchDarkly source/target instances for the config bridge.
# Tokens are NOT here — they come from env (see .env.example).
# The bridge can pull from a `source` and provision into a `target`; both are
# configurable to any LD instance/project.

# TARGET: the project the running prototype reads from and writes to.
target:
  base_url: ${LD_BASE_URL}            # default: https://app.launchdarkly.com
  project_key: ${LD_PROJECT_KEY}

# SOURCE (optional): where the bridge pulls the initial configs + graphs from.
# - Design partners may seed from the shared "auto-factory-prototype" project.
# - Otherwise omit — provision straight from the canonical local copies in
#   packages/config-bridge/configs/.
source:
  base_url: ${LD_SOURCE_BASE_URL}
  project_key: ${LD_SOURCE_PROJECT_KEY}
